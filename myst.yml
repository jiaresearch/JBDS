# See docs at: https://mystmd.org/guide/frontmatter

# Jupyter Book Guides:
# Installation: pip install "jupyter-book>=2.0.0"
# Initialization: jupyter book init
# Supported file content: .md, .ipynb, .tex
# Start local server: jupyter book start
# Initialize Github pages: jupyter book init --gh-pages (note: has to be a git depository)


version: 1
project:
  id: 4da9cb15-177c-41f5-8c4e-6a24b4e87eab
  title: An example Jupyter Book
  description: A collection of files that build up a book
  keywords:
    - jupyter-book
    - something-else
  github: captain-jupyter/my-book
  # To autogenerate a table of contents, run "jupyter book init --write-toc"
  toc:
    # Auto-generated by `myst init --write-toc`
    - file: intro.md
    - file: 1.1 Regex Basics.ipynb
    - file: 1.2 Pandas.ipynb
    - file: 1.3 Pandas Data Aggregation.ipynb
    - file: 1.4 Categorical Var.ipynb
    - file: 1.5 Pandas Pivot Tables.ipynb
    - file: 1.6 Pandas Date and Time.ipynb
site:
  template: book-theme
  options:
    # class: col-page-right
    #hide_outline: true
    style: custom.css
    logo_text: " "
  #   favicon: favicon.ico
  #   logo: site_logo.png

